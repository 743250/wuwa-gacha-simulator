向:'<b style="color:#ff8c5e">航向确定！</b>（布兰特延奏）<br>切下场后给登场角色加 buff；2 链：20 秒内队友共鸣技能命中时触发布兰特爆炸 atk×440% 热熔。',羊咩:'<b style="color:#ff8c5e">羊咩</b>（安可常态攻击体系）<br>安可与白咩/黑咩玩偶一起攻击。常态下是<b class="term-normal">羊咩出击</b> + <b class="term-skill">热力羊咩</b>；释放<b class="term-burst">黑咩大暴走</b>后进入黑咩形态。',失序值:'<b style="color:#a78bff">失序值</b>（安可共鸣回路 · 0-100）<br>普攻 +<b>20</b> / 共鸣技能 +<b>35</b> / 变奏 +<b>30</b>；黑咩窗口内命中额外 +<b>10</b>。<br>满 <b>100</b> 时施放重击，消耗全部失序值并触发<b class="term-burst">白咩·失控之炎</b>或<b class="term-burst">黑咩·暴走之炎</b>（均视为共鸣解放伤害）。',黑咩大暴走:'<b style="color:#a78bff">黑咩大暴走</b>（安可共鸣解放 · 强化形态）<br>释放后进入<b style="color:#a78bff">黑咩形态</b>，持续 <b>4</b> 回合。期间攻击和技能获得强化，命中额外 +<b>10</b> <b class="term-resource">失序值</b>。',行狮:'<b style="color:var(--gold)">行狮形态</b>（凌阳解放强化 · 持续战斗剩余时间）<br>进入方式：释放<b style="color:var(--burst)">共鸣解放·狮子奋迅</b>触发。<br>· 3 链：普攻 +<b>20%</b> / 共鸣技能 +<b>10%</b><br>· 6 链：每次共鸣技能·飞身式后，下次普攻 +<b>100%</b><br>· 1 链：行狮状态期间抗打断<br>· 形态持续到下一次进入战斗 / 切人下场',架势:'<b style="color:var(--green)">架势</b>（鉴心战斗状态）<br>进入方式：施放<b style="color:var(--accent)">共鸣技能·静气循行</b>。<br>· 进入架势姿态保持 <b>1</b> 回合<br>· 期间可施放<b style="color:var(--accent)">行气反击</b>（3 链：架势保持后才能打出）<br>· 2 链：静气循行使用次数 +<b>1</b><br>· 5 链：解放·涤净力场范围 +<b>33%</b>',雾化分身:'<b style="color:var(--green)">雾化分身</b>（秋水召唤物）<br><b style="color:var(--accent)">共鸣技能·移位戏法</b>召唤；嘲讽敌人，2 链：秋水攻击被嘲讽目标 +15% 攻击。',热压弹:'<b style="color:#ff8c5e">热压弹</b>（炽霞解放资源）<br><b style="color:var(--burst)">共鸣解放·炽烈焰火</b>开启时获 60 发，配合重置技能 CD 实现高速持续输出。',朱蚀之刻:'<b style="color:#a78bff">朱蚀之刻</b>（丹瑾 debuff）<br><b style="color:var(--accent)">共鸣技能·朱蚀之刻</b>给目标附加。攻击带朱蚀的目标时丹瑾攻击 +5%/层（满 6 层 +30%），伤害 +20%（2 链）。',彤华:'<b style="color:#a78bff">彤华</b>（丹瑾共鸣回路 · 0-100）<br>≥ 60 时丹瑾暴击 +15%（4 链）。<b style="color:#ff8c5e">重击·缭乱</b>消耗所有彤华。',雷厉风行:'<b style="color:#7bd6ff">雷厉风行</b>（渊武战斗状态）<br>1 链：进入后普攻/重击攻速 +20%（等效提升攻击 +10%）。',诗中物:'<b style="color:#7bd6ff">诗中物</b>（釉瑚共鸣回路）<br>对偶/联珠/合说三种叠层触发不同效果；2 链：对偶/联珠/合说对诗中物的伤害额外生效一次。',冰绽:'<b style="color:#7bd6ff">冰绽</b>（散华共鸣回路 · 冰锥引爆）<br><b style="color:#ff8c5e">重击·爆裂</b>引爆累计的<b>冰棘</b>/<b>冰棱</b>/<b>冰川</b>造成冷凝伤害。<br>· 5 链：冰绽暴击伤害 +<b>100%</b>，冰棘/冰棱/冰川消失时自动爆炸（不需手动引爆）<br>· 6 链：引爆冰棱/冰川后全队攻击 +<b>10%</b>，可叠 <b>2</b> 层',焕彩:'<b style="color:var(--gold)">焕彩</b>（珂莱塔解放 debuff · 停滞效果）<br><b style="color:var(--burst)">共鸣解放·死兆</b>的射击命中目标时附加：<br>· 目标持续时间内无法行动（停滞）<br>· 受到伤害或持续 <b>1.5</b> 秒时清除',行气反击:'<b style="color:var(--accent)">行气反击</b>（鉴心派生技能 · 架势后触发）<br>处于<b>架势</b>状态时，下次施放<b style="color:var(--accent)">共鸣技能</b>会变为<b>行气反击</b>。<br>· 高倍率气动伤害<br>· 6 链：在重击·混元气旋期间可施放<b>特殊行气反击</b>（atk × <b>557%</b> 重击类型）',迷失羔羊:'<b style="color:#a78bff">迷失羔羊</b>（安可 6 链 buff · 0-5 层）<br><b style="color:var(--burst)">共鸣解放·黑咩大暴走</b>期间，每次造成伤害自身叠 <b>1</b> 层，每层使攻击 +<b>5%</b>，最多 <b>5</b> 层（满层 +25% 攻击）。',空中攻击:'<b style="color:#ff8c5e">空中攻击</b>（部分角色机制）<br>跳跃 / 腾空后的派生攻击。战斗中按<b style="color:#ff8c5e">重击</b>类型结算，享受重击伤害加成。典型代表：卡提希娅、布兰特、秧秧。',空中攻击空翻:'<b style="color:#ff8c5e">空中攻击空翻</b>（布兰特机制）<br>布兰特在空中做空翻，是其核心爆发段。每次空翻给布兰特<b style="color:#ff8c5e">"跟随洋流和信风"</b> +1 层伤害提升（1 链）。战斗中按<b style="color:#ff8c5e">重击</b>类型结算。',空中释羽:'<b style="color:#ff8c5e">空中释羽</b>（秧秧标志性输出段）<br>秧秧跳跃后释放羽箭群的派生<b style="color:#ff8c5e">重击</b>。是秧秧的主要爆发段。<br>· 4 链：空中释羽伤害 +<b>95%</b><br>· 6 链：施放后全队攻击 +<b>20%</b>，持续 20 秒',闪避反击:'<b style="color:var(--green)">闪避反击</b>（部分角色机制）<br>成功闪避后立刻反击的派生动作。战斗中视作变奏类派生，通常用于触发角色的反击/追击效果。',"强化·前扑":'<b style="color:var(--accent)">强化·前扑</b>（灯灯派生）<br>灯灯特定条件下普攻强化为前扑，向目标突进。<br>· 2 链：前扑攻击无视 <b>20%</b> 防御',"强化·后撤":'<b style="color:var(--accent)">强化·后撤</b>（灯灯派生）<br>灯灯特定条件下普攻强化为后撤，拉远距离同时攻击。<br>· 1 链：后撤后 <b>3</b> 秒内回复 <b>60%</b> 耐力<br>· 2 链：后撤攻击无视 <b>20%</b> 防御',牵引:'<b style="color:var(--green)">牵引</b>（控场效果）<br>把附近敌人拉到一起，方便范围伤害命中更多目标。战斗中表现为聚怪效果，提高 AOE 技能的命中价值。典型代表：秧秧·风场鸣声、菲比·镜之环。',风场鸣声:'<b style="color:var(--accent)">风场鸣声</b>（秧秧共鸣技能）<br>召唤气动风场，<b>牵引</b>范围内敌人到一起。<br>· 3 链：风场牵引范围 +<b>33%</b>',停滞:'<b style="color:var(--gold)">停滞</b>（控制 debuff）<br>使目标短暂无法行动的状态，类似"冻结"但只锁动作不锁伤害。<br>触发：珂莱塔·焕彩、菲比·镜之环、坎特蕾拉·迷梦、布兰特·火焰归亡曲等。',嘲讽:'<b style="color:var(--green)">嘲讽</b>（仇恨控制 debuff）<br>使敌人优先攻击指定目标，保护队伍中的输出角色。典型代表：秋水·雾化分身。',协         <h2 class="col-head" style="margin-top:0">钱 包</h2>
        <div class="shop-bar">
          <div class="sb spent"><div class="l">累计充值</div><div class="v" id="kSpent">¥0</div></div>
          <div class="sb lun"><div class="l">月相库存</div><div class="v" id="kLunite">0</div></div>
          <div class="sb days"><div class="l">月卡剩余</div><div class="v" id="kDays">0</div></div>
        </div>

        <!-- 商店分类 tab -->
        <div class="shop-cat-tabs">
          <button class="sct on" data-sc="featured">特惠专区</button>
          <button class="sct" data-sc="regular">常驻礼包</button>
          <button class="sct" data-sc="topup">凝刻月相</button>
        </div>

        <!-- 特惠专区：月卡 + 战令 + 限购礼包 -->
        <div class="shop-cat" id="scFeatured">
          <div class="shop-banners" id="bannerFeatured"></div>
        </div>

        <!-- 常驻礼包：长期不下架的礼包（暂时也是 bundle 里的，按 period 区分） -->
        <div class="shop-cat" id="scRegular" style="display:none">
          <div class="shop-banners" id="bannerRegular"></div>
        </div>

        <!-- 凝刻月相（直充） -->
        <div class="shop-cat" id="scTopup" style="display:none">
          <div class="shop-banners topup-grid" id="bannerTopup"></div>
        </div>

        <div style="display:flex;gap:6px;margin-top:14px">
          <button class="mbtn gold" style="flex:1" id="convertLunite">月 相 → 星 声</button>
          <button class="mbtn" style="flex:1" id="dailyLunite">领月卡星声</button>
        </div>
        <div style="display:flex;gap:6px;margin-top:6px">
          <button class="mbtn" style="flex:1" id="exportSaveBtn">导出存档</button>
          <button class="mbtn" style="flex:1" id="importSaveBtn">导入存档</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 全局 toast -->
  <div class="toast" id="toast"></div>
</div>

<!-- 抽卡动画 -->
<div class="overlay" id="ov">
  <div class="ov-title" id="ovTitle"></div>
  <div class="beam" id="beam"></div>
  <div class="sparks" id="sparks"></div>
  <div class="cards-wrap" id="cards"></div>
</div>
<div class="skip-hint" id="skipHint">点击屏幕翻开所有 · 再次点击关闭</div>

<!-- 通用弹窗 -->
<div class="modal" id="modal">
  <div class="modal-box" id="modalBox"></div>
</div>

<!-- 战斗界面（全屏覆盖） -->
<div id="battleOverlay" style="display:none;position:fixed;inset:0;z-index:85;background:rgba(0,0,0,.92);backdrop-filter:blur(8px);align-items:flex-start;justify-content:center;overflow-y:auto"></div>

</body>
</html>
