<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>鸣潮 · 唤取</title>
<style>
:root{
  color-scheme:dark;
  --bg:#060912;--bg2:#0d1422;
  --panel:rgba(18,26,42,.85);--panel2:rgba(28,40,58,.6);
  --line:rgba(140,180,220,.14);--line2:rgba(140,180,220,.28);
  --text:#eef3f8;--muted:#8a99a8;--dim:#5a6a78;
  --gold:#f5cf6b;--gold2:#fff0b0;--purple:#c39bff;--blue:#69b8ff;
  --accent:#7bd6ff;--red:#ff8585;--green:#8de6a6;
  --r-radiant:#f5cf6b;--r-forging:#ff9a6b;--r-lustrous:#7bd6ff;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  overflow-x:hidden;min-height:100vh}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(1200px 700px at 80% -5%,rgba(123,214,255,.10),transparent 55%),
    radial-gradient(900px 600px at -5% 30%,rgba(245,207,107,.07),transparent 55%),
    radial-gradient(700px 700px at 50% 110%,rgba(195,155,255,.10),transparent 55%)}
button{font:inherit;cursor:pointer;color:inherit}
input,select{font:inherit;color:inherit}

/* ===== 顶部资源条 ===== */
.topbar{position:sticky;top:0;z-index:20;backdrop-filter:blur(14px);
  background:linear-gradient(180deg,rgba(6,9,18,.96),rgba(6,9,18,.78));
  border-bottom:1px solid var(--line)}
.topbar-in{max-width:1320px;margin:0 auto;padding:10px 18px;
  display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.brand{font-weight:600;letter-spacing:8px;font-size:16px;
  background:linear-gradient(135deg,#fff,#a8c8e0);-webkit-background-clip:text;background-clip:text;color:transparent}
.gres{display:flex;gap:7px;flex-wrap:wrap;flex:1;justify-content:flex-end}
.gtag{display:inline-flex;align-items:center;gap:6px;padding:6px 6px 6px 11px;
  border:1px solid var(--line);border-radius:999px;font-size:12px;
  background:rgba(255,255,255,.03)}
.gtag .dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.gtag b{font-weight:700;letter-spacing:.5px}
.gtag .plus{width:18px;height:18px;border-radius:50%;border:1px solid currentColor;
  display:inline-flex;align-items:center;justify-content:center;font-size:13px;
  cursor:pointer;background:transparent;color:inherit;line-height:1;padding:0;
  margin-left:2px;opacity:.7;transition:.15s}
.gtag .plus:hover{opacity:1;background:rgba(255,255,255,.08);transform:scale(1.08)}
.gtag.ast{border-color:rgba(255,255,255,.2)} .gtag.ast .dot{background:#fff} .gtag.ast b{color:#fff}
.gtag.lun .dot{background:var(--gold)} .gtag.lun b{color:var(--gold)}
.gtag.r{border-color:rgba(245,207,107,.32)} .gtag.r .dot{background:var(--r-radiant)} .gtag.r b{color:var(--r-radiant)}
.gtag.f{border-color:rgba(255,154,107,.32)} .gtag.f .dot{background:var(--r-forging)} .gtag.f b{color:var(--r-forging)}
.gtag.l{border-color:rgba(123,214,255,.32)} .gtag.l .dot{background:var(--r-lustrous)} .gtag.l b{color:var(--r-lustrous)}
.gtag.day{border-color:rgba(141,230,166,.3)} .gtag.day .dot{background:var(--green)} .gtag.day b{color:var(--green)}

.app{position:relative;z-index:1;max-width:1480px;margin:0 auto;padding:14px 18px 40px}

/* ===== 时间线 ===== */
.timeline{display:flex;align-items:center;gap:14px;padding:12px 16px;
  border:1px solid var(--line);border-radius:14px;background:var(--panel);margin-bottom:14px;flex-wrap:wrap}
.timeline .now{font-size:20px;font-weight:600;letter-spacing:3px}
.timeline .meta{color:var(--muted);font-size:11px;letter-spacing:1px;margin-top:2px}
.timeline .ti{flex:1;min-width:160px}
.t-actions{display:flex;gap:6px;flex-wrap:wrap}
.tbtn{padding:7px 12px;border:1px solid var(--line);border-radius:8px;
  background:rgba(255,255,255,.03);font-size:12px;letter-spacing:1px;transition:.2s}
.tbtn:hover{border-color:var(--accent);color:var(--accent)}
.tbtn.danger:hover{border-color:var(--red);color:var(--red)}

/* 上下分区骨架 */
.section-top{display:block}
.section-bot{display:grid;grid-template-columns:1.05fr 1.1fr;gap:14px;margin-top:14px}
@media(max-width:980px){.section-bot{grid-template-columns:1fr}}
.col{display:flex;flex-direction:column;gap:14px;min-width:0}

/* ===== 卡池 左 tab + 右内容 ===== */
.banner-wrap{border:1px solid var(--line);border-radius:14px;background:var(--panel);overflow:hidden;margin-bottom:14px;display:grid;grid-template-columns:200px 1fr;min-height:240px}
.banner-tabs{display:flex;flex-direction:column;gap:0;border-right:1px solid var(--line);overflow-y:auto;background:rgba(0,0,0,.18)}
.banner-tabs::-webkit-scrollbar{width:4px} .banner-tabs::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12)}
.btab{padding:12px 14px;font-size:12px;color:var(--muted);
  letter-spacing:1px;border-left:3px solid transparent;cursor:pointer;
  transition:.18s;line-height:1.45;text-align:left}
.btab:hover{background:rgba(255,255,255,.04);color:var(--text)}
.btab .bt-kind{display:block;font-size:9px;letter-spacing:2px;opacity:.55;margin-bottom:2px}
.btab .bt-name{font-weight:500}
.btab.on{color:var(--text);background:rgba(123,214,255,.06);border-left-color:var(--accent)}
.btab.on.r{border-left-color:var(--r-radiant);background:rgba(245,207,107,.06);color:var(--gold2)}
.btab.on.w{border-left-color:var(--r-lustrous);background:rgba(123,214,255,.08);color:#cfeaff}
@media(max-width:680px){
  .banner-wrap{grid-template-columns:1fr;grid-template-rows:auto 1fr}
  .banner-tabs{flex-direction:row;overflow-x:auto;border-right:none;border-bottom:1px solid var(--line)}
  .btab{flex:0 0 auto;border-left:none;border-bottom:3px solid transparent;white-space:nowrap;padding:10px 14px}
  .btab.on{border-left-color:transparent}
  .btab.on,.btab.on.r,.btab.on.w{border-bottom-color:var(--accent)}
  .btab.on.r{border-bottom-color:var(--r-radiant)}
  .btab.on.w{border-bottom-color:var(--r-lustrous)}
  .btab .bt-kind{display:inline;margin-right:4px}
}

/* 卡池详情 banner art */
.banner-art{position:relative;padding:32px 28px;min-height:240px;
  background:linear-gradient(135deg,#1b2a40 0%,#0a1220 100%);overflow:hidden;
  display:flex;justify-content:space-between;gap:20px}
.banner-art.theme-r{background:linear-gradient(135deg,#3a2a14 0%,#1a1208 60%,#0a0604 100%)}
.banner-art.theme-l{background:linear-gradient(135deg,#16344a 0%,#0a1a26 60%,#040a10 100%)}
.banner-art::after{content:"";position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(circle at 100% -10%,rgba(255,255,255,.16),transparent 50%)}
.banner-art .ba-main{z-index:1;display:flex;flex-direction:column;justify-content:center}
.banner-art .ba-sub{font-size:11px;color:var(--muted);letter-spacing:4px}
.banner-art .ba-name{font-size:38px;font-weight:700;letter-spacing:3px;margin-top:6px;
  text-shadow:0 4px 28px rgba(0,0,0,.7)}
.banner-art .ba-name.small{font-size:28px}
.banner-art .ba-banner{font-size:14px;color:var(--gold);margin-top:10px;letter-spacing:1px;font-weight:500}
.banner-art .ba-fours{margin-top:10px;font-size:12px;color:var(--muted);letter-spacing:.5px}
.banner-art .ba-fours b{color:var(--text);font-weight:400;margin-right:2px}
.banner-art .ba-meta{z-index:1;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;text-align:right;flex-shrink:0}
.banner-art .ba-up{font-size:11px;letter-spacing:3px;padding:6px 14px;border-radius:999px;
  background:var(--gold);color:#1a1208;font-weight:700;}
.banner-art .ba-period{font-size:12px;color:var(--dim);margin-top:16px;letter-spacing:1px}
.banner-art .ba-remaining{font-size:13px;color:var(--muted);margin-top:6px;letter-spacing:1px}
.banner-art .ba-weapon{font-size:13px;color:var(--dim);margin-top:14px;letter-spacing:.5px}
.banner-art .ba-weapon b{color:#fff;font-weight:500}
@media(max-width:680px){
  .banner-art{flex-direction:column;padding:22px 18px;min-height:0;gap:14px}
  .banner-art .ba-meta{align-items:flex-start;text-align:left}
  .banner-art .ba-name{font-size:30px;letter-spacing:2px}
  .banner-art .ba-name.small{font-size:24px}
}

/* ===== 抽卡主区 ===== */
.pull-card{border:1px solid var(--line);border-radius:14px;background:var(--panel);
  padding:16px;margin-bottom:14px}

/* 显眼资源消耗看板 */
.cost-panel{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
@media(max-width:560px){.cost-panel{grid-template-columns:1fr}}
.cost{border:1px solid var(--line);border-radius:10px;padding:11px 14px;
  background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.01));position:relative}
.cost .lbl{font-size:10px;color:var(--muted);letter-spacing:2px}
.cost .val{display:flex;align-items:baseline;gap:6px;margin-top:5px}
.cost .val b{font-size:26px;font-weight:700;letter-spacing:1px;line-height:1}
.cost .val .u{font-size:11px;color:var(--dim)}
.cost.tide.r b{color:var(--r-radiant)}
.cost.tide.f b{color:var(--r-forging)}
.cost.tide.l b{color:var(--r-lustrous)}
.cost.ast b{color:#fff}
.cost.can b{color:var(--accent)}
.cost .sub{margin-top:4px;font-size:10px;color:var(--dim);letter-spacing:.5px}

/* 保底条 */
.pity-row{display:flex;align-items:center;gap:14px;padding:10px 14px;
  border:1px solid var(--line);border-radius:10px;margin-bottom:14px;background:rgba(255,255,255,.02)}
.pity-row .pl{font-size:11px;color:var(--muted);letter-spacing:2px}
.pity-row .pv{font-size:18px;font-weight:700;margin-top:2px}
.pity-row .pv b{color:var(--gold)}
.pity-bar{flex:1;height:6px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden;min-width:80px}
.pity-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .4s}
.pity-tag{font-size:11px;padding:5px 11px;border-radius:999px;border:1px solid var(--line);letter-spacing:1px;color:var(--muted)}
.pity-tag.guar{border-color:var(--gold);color:var(--gold);background:rgba(245,207,107,.08)}

/* 抽卡按钮 */
.pull-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pbtn{position:relative;border:1px solid rgba(245,207,107,.45);border-radius:12px;
  padding:18px 12px;background:linear-gradient(180deg,#3a2a14,#1a1208);color:var(--gold);
  letter-spacing:3px;overflow:hidden;transition:.2s;text-align:center}
.pbtn::before{content:"";position:absolute;inset:0;
  background:linear-gradient(120deg,transparent 40%,rgba(255,235,180,.2) 50%,transparent 60%);
  transform:translateX(-100%);transition:transform .6s}
.pbtn:hover::before{transform:translateX(100%)}
.pbtn:hover{box-shadow:0 0 24px rgba(245,207,107,.3);transform:translateY(-1px)}
.pbtn .big{display:block;font-size:20px;font-weight:700;letter-spacing:6px}
.pbtn .small{display:block;font-size:11px;color:rgba(245,207,107,.75);margin-top:4px;letter-spacing:2px}
.pbtn:disabled{opacity:.32;cursor:not-allowed;transform:none;box-shadow:none}
.pbtn:disabled::before{display:none}

.pull-extras{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.xbtn{flex:1;min-width:120px;padding:9px 12px;border:1px solid var(--line);border-radius:8px;
  background:rgba(255,255,255,.03);font-size:12px;letter-spacing:1px;transition:.2s}
.xbtn:hover{border-color:var(--accent);color:var(--accent)}
.xbtn:disabled{opacity:.4;cursor:not-allowed}

.toast{margin-top:10px;min-height:18px;font-size:12px;letter-spacing:1px;color:var(--red);text-align:center}

/* ===== 侧面板 ===== */
.col-wrap{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;overflow:hidden}
.col-head{margin:0 0 10px;font-size:12px;letter-spacing:3px;color:var(--muted);font-weight:600}
.side-tabs{display:flex;gap:2px;background:rgba(0,0,0,.25);border-radius:10px;padding:3px;margin-bottom:12px}
.s-tab{flex:1;text-align:center;padding:9px 4px;font-size:12px;color:var(--muted);
  cursor:pointer;border-radius:8px;letter-spacing:2px;transition:.2s}
.s-tab.on{background:rgba(123,214,255,.14);color:var(--text)}

/* 海市资源 */
.coral-bar{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.coral{border:1px solid var(--line);border-radius:12px;padding:12px 14px;
  background:linear-gradient(135deg,rgba(123,214,255,.06),rgba(123,214,255,.01))}
.coral .l{font-size:10px;color:var(--muted);letter-spacing:2px}
.coral .v{font-size:28px;font-weight:700;color:var(--accent);margin-top:3px;line-height:1}
.coral .h{font-size:10px;color:var(--accent);margin-top:6px;letter-spacing:.5px;opacity:.7}
.coral.osc{background:linear-gradient(135deg,rgba(195,155,255,.06),rgba(195,155,255,.01))}
.coral.osc .v,.coral.osc .h{color:var(--purple)}

.exch-list{display:flex;flex-direction:column;gap:8px}
.exch{border:1px solid var(--line);border-radius:10px;padding:11px 13px;background:rgba(255,255,255,.02)}
.exch .n{font-weight:600;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.exch .own{font-size:11px;color:var(--muted);font-weight:400}
.exch .own b{color:var(--text);margin:0 3px}
.exch .btns{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.mbtn{font-size:11px;padding:7px 12px;border-radius:7px;
  border:1px solid var(--line);background:rgba(255,255,255,.04);
  letter-spacing:1px;transition:.2s}
.mbtn:hover{border-color:var(--accent);color:var(--accent)}
.mbtn.gold{border-color:rgba(245,207,107,.4);color:var(--gold)}
.mbtn.gold:hover{border-color:var(--gold);background:rgba(245,207,107,.1)}
.mbtn:disabled{opacity:.35;cursor:not-allowed;color:var(--dim);border-color:var(--line)}
.mbtn:disabled:hover{background:rgba(255,255,255,.04);color:var(--dim)}

/* 商店钱包 */
.shop-bar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:14px}
.sb{border:1px solid var(--line);border-radius:10px;padding:9px 10px;text-align:center;background:rgba(255,255,255,.02)}
.sb .l{font-size:9px;color:var(--muted);letter-spacing:1px}
.sb .v{font-size:16px;font-weight:700;margin-top:2px;line-height:1.1}
.sb.spent .v{color:var(--red)}
.sb.lun .v{color:var(--gold)}
.sb.days .v{color:var(--green)}

.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.shopit{border:1px solid var(--line);border-radius:10px;padding:11px;background:rgba(255,255,255,.02);
  display:flex;flex-direction:column;gap:6px;transition:.2s}
.shopit:hover{border-color:var(--line2)}
.shopit .n{font-size:13px;font-weight:600}
.shopit .d{font-size:10px;color:var(--muted);letter-spacing:.5px;line-height:1.6;flex:1}
.shopit .p{font-size:15px;color:var(--gold);font-weight:700;letter-spacing:1px}
.shopit .mbtn{margin-top:auto}

/* 角色 — 方块网格 */
.roles{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;max-height:640px;overflow-y:auto;padding-right:3px}
.roles::-webkit-scrollbar{width:4px} .roles::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:2px}
.role{position:relative;aspect-ratio:1;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.02);
  display:flex;flex-direction:column;justify-content:flex-end;padding:10px 8px 9px;cursor:pointer;user-select:none;
  transition:transform .15s,box-shadow .2s,border-color .2s;overflow:hidden}
.role:hover{transform:translateY(-2px)}
.role.r5{border-color:rgba(245,207,107,.55);background:radial-gradient(circle at 50% 30%,rgba(245,207,107,.18),transparent 70%),rgba(74,54,20,.15);box-shadow:0 0 18px rgba(245,207,107,.18) inset,0 4px 14px rgba(245,207,107,.18)}
.role.r5:hover{box-shadow:0 0 26px rgba(245,207,107,.32) inset,0 6px 22px rgba(245,207,107,.32)}
.role.r4{border-color:rgba(195,155,255,.5);background:radial-gradient(circle at 50% 30%,rgba(195,155,255,.16),transparent 70%),rgba(51,35,90,.18);box-shadow:0 0 16px rgba(195,155,255,.16) inset,0 4px 12px rgba(195,155,255,.18)}
.role.r4:hover{box-shadow:0 0 24px rgba(195,155,255,.3) inset,0 6px 20px rgba(195,155,255,.3)}
.role .chain-badge{position:absolute;top:6px;right:6px;font-size:10px;font-weight:700;letter-spacing:.5px;padding:2px 6px;border-radius:6px;
  background:rgba(0,0,0,.55);border:1px solid var(--line);color:var(--muted)}
.role .chain-badge.full{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a1208;border-color:transparent}
.role .chain-badge.has{color:var(--gold);border-color:rgba(245,207,107,.45)}
.role .stars{font-size:10px;letter-spacing:1px;text-align:center;line-height:1;margin-bottom:5px}
.role.r5 .stars{color:var(--gold);text-shadow:0 0 6px rgba(245,207,107,.6)}
.role.r4 .stars{color:var(--purple);text-shadow:0 0 6px rgba(195,155,255,.55)}
.role .rname{font-size:12px;font-weight:700;text-align:center;letter-spacing:.5px;line-height:1.25;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.role.r5 .rname{color:var(--gold)} .role.r4 .rname{color:#dbc6ff}
.role .spare-dot{position:absolute;bottom:6px;left:8px;font-size:9px;color:var(--accent);letter-spacing:.5px;font-weight:600}

/* 角色弹窗内 共鸣链 */
.seq-detail{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.seq-line{font-size:11px;line-height:1.7;letter-spacing:.3px}
.seq-name{display:block;color:var(--muted);font-weight:600;margin-bottom:2px;letter-spacing:1px}
.seq-name.owned{color:var(--gold)}
.seq-desc{color:var(--dim)}
.chain{display:grid;grid-template-columns:repeat(6,1fr);gap:3px;margin:8px 0 10px}
.chain i{display:block;height:18px;border-radius:3px;background:rgba(255,255,255,.05);
  font-size:9px;text-align:center;line-height:18px;color:var(--muted);font-style:normal}
.chain i.on{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a1208;font-weight:700}

/* 记录 */
.log{max-height:680px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;padding-right:3px}
.log::-webkit-scrollbar{width:4px} .log::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:2px}
.logrow{display:grid;grid-template-columns:32px 1fr auto;gap:6px;
  border-left:3px solid var(--line);padding:6px 10px;background:rgba(255,255,255,.02);
  border-radius:0 6px 6px 0;font-size:12px;align-items:center}
.logrow.r5{border-left-color:var(--gold);background:rgba(245,207,107,.06)}
.logrow.r4{border-left-color:var(--purple);background:rgba(195,155,255,.04)}
.logrow.r3{border-left-color:var(--blue)}
.logrow .dt{color:var(--dim);font-size:9px;text-align:right;letter-spacing:.5px;line-height:1.4}

/* 统计 */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.stat{border:1px solid var(--line);border-radius:10px;padding:11px;background:rgba(255,255,255,.02);text-align:center}
.stat b{display:block;font-size:20px;font-weight:700}
.stat span{display:block;font-size:10px;color:var(--muted);letter-spacing:1px;margin-top:3px}

/* ===== 抽卡动画（加宽 + 加文字） ===== */
.overlay{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,0);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .35s,background .35s;padding:20px}
.overlay.on{opacity:1;pointer-events:auto;background:rgba(0,0,0,.95)}

/* 顶部大字 */
.ov-title{position:relative;z-index:3;text-align:center;margin-bottom:18px;opacity:0;transition:opacity .5s .3s}
.overlay.on .ov-title{opacity:1}
.ov-title .lvl{font-size:14px;letter-spacing:8px;color:var(--muted);text-transform:uppercase}
.ov-title .lvl.gold{color:var(--gold);text-shadow:0 0 12px rgba(245,207,107,.6)}
.ov-title .lvl.purple{color:var(--purple)}
.ov-title .lvl.blue{color:var(--blue)}
.ov-title .summary{font-size:13px;color:var(--text);margin-top:8px;letter-spacing:2px;opacity:.85}
.ov-title .summary .g{color:var(--gold)}
.ov-title .summary .p{color:var(--purple)}
.ov-title .summary .b{color:var(--blue)}

.beam{position:absolute;top:50%;left:50%;width:6px;height:0;transform:translate(-50%,-50%);
  filter:blur(2px);opacity:0;transition:height .5s ease-out,opacity .4s;
  background:linear-gradient(180deg,transparent,#fff,transparent);z-index:1}
.beam.show{height:140vh;opacity:1}
.beam.gold{background:linear-gradient(180deg,transparent,#fff7c0 30%,#f5cf6b 50%,#fff7c0 70%,transparent);
  box-shadow:0 0 100px 16px rgba(245,207,107,.6)}
.beam.purple{background:linear-gradient(180deg,transparent,#e6d4ff 30%,#c39bff 50%,#e6d4ff 70%,transparent);
  box-shadow:0 0 70px 10px rgba(195,155,255,.55)}
.beam.blue{background:linear-gradient(180deg,transparent,#cfeaff 30%,#69b8ff 50%,#cfeaff 70%,transparent);
  box-shadow:0 0 50px 8px rgba(105,184,255,.45)}

.sparks{position:absolute;top:50%;left:50%;width:0;height:0;pointer-events:none;z-index:2}
.sparks i{position:absolute;width:4px;height:4px;border-radius:50%;background:#fff;
  box-shadow:0 0 10px #fff;opacity:0}
@keyframes spark{
  0%{opacity:1;transform:translate(0,0) scale(1)}
  100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}}

.cards-wrap{position:relative;z-index:3;display:grid;grid-template-columns:repeat(5,1fr);gap:14px;
  width:min(96vw,1100px);padding:0 8px;opacity:0;transform:scale(.95);
  transition:opacity .3s .3s,transform .3s .3s}
.cards-wrap.show{opacity:1;transform:scale(1)}
.cards-wrap.single{grid-template-columns:1fr;width:min(86vw,300px)}

.gcard{aspect-ratio:3/5;border-radius:12px;border:1px solid var(--line);
  position:relative;overflow:hidden;cursor:pointer;
  transform:rotateY(180deg);transition:transform .6s ease;transform-style:preserve-3d}
.gcard.flipped{transform:rotateY(0deg)}
/* 卡背：水墨海浪纹 */
.gcard::before{content:"";position:absolute;inset:0;backface-visibility:hidden;
  transform:rotateY(180deg);border-radius:12px;
  background:
    radial-gradient(ellipse at 50% 40%,rgba(123,214,255,.25),transparent 50%),
    radial-gradient(ellipse at 50% 90%,rgba(245,207,107,.12),transparent 60%),
    linear-gradient(135deg,#0e1a2a,#04080f)}
.gcard::after{content:"潮";position:absolute;inset:0;backface-visibility:hidden;
  transform:rotateY(180deg);display:flex;align-items:center;justify-content:center;
  font-size:42px;font-weight:700;color:rgba(255,255,255,.06);letter-spacing:5px;
  text-shadow:0 0 30px rgba(123,214,255,.3)}
.gcard .face{position:absolute;inset:0;backface-visibility:hidden;
  display:flex;flex-direction:column;justify-content:space-between;padding:12px;
  border-radius:12px;border:1px solid var(--line)}
.gcard.r5 .face{border-color:var(--gold);
  background:radial-gradient(circle at 50% 30%,rgba(245,207,107,.4),transparent 60%),
    linear-gradient(180deg,#3a2a10,#1a1208 70%,#0a0604);
  box-shadow:0 0 36px rgba(245,207,107,.5) inset,0 0 32px rgba(245,207,107,.55)}
.gcard.r4 .face{border-color:var(--purple);
  background:radial-gradient(circle at 50% 30%,rgba(195,155,255,.35),transparent 60%),
    linear-gradient(180deg,#251a3a,#120c20 70%,#080510);
  box-shadow:0 0 28px rgba(195,155,255,.4) inset,0 0 20px rgba(195,155,255,.4)}
.gcard.r3 .face{border-color:var(--blue);
  background:radial-gradient(circle at 50% 30%,rgba(105,184,255,.2),transparent 60%),
    linear-gradient(180deg,#0e2030,#081420 70%,#040810)}
.gcard .stars{font-size:15px;letter-spacing:3px;text-align:center;margin-top:8px}
.gcard.r5 .stars{color:var(--gold);text-shadow:0 0 8px rgba(245,207,107,.8)}
.gcard.r4 .stars{color:var(--purple)}
.gcard.r3 .stars{color:var(--blue)}
.gcard .nm{font-weight:700;font-size:14px;text-align:center;line-height:1.3;
  text-shadow:0 2px 10px rgba(0,0,0,.8);padding:0 2px}
.gcard.single .nm{font-size:18px;letter-spacing:1px}
.gcard .tg{font-size:10px;color:rgba(255,255,255,.65);text-align:center;letter-spacing:.5px;margin-top:3px}
.gcard.up .face{box-shadow:0 0 36px rgba(245,207,107,.5) inset,0 0 56px rgba(245,207,107,.65)}
.gcard.r5.up .face{
  background:radial-gradient(circle at 50% 25%,rgba(255,240,170,.6),transparent 65%),
    linear-gradient(180deg,#4a3614,#221608 70%,#0a0604);
  border-color:var(--gold2);
  box-shadow:0 0 44px rgba(245,207,107,.7) inset,0 0 72px rgba(255,240,170,.8)}
.gcard.r4.up .face{
  background:radial-gradient(circle at 50% 25%,rgba(220,190,255,.5),transparent 65%),
    linear-gradient(180deg,#33235a,#160c28 70%,#080510);
  border-color:#d9beff;
  box-shadow:0 0 32px rgba(195,155,255,.6) inset,0 0 48px rgba(220,190,255,.7)}

.skip-hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:81;
  color:var(--muted);font-size:11px;letter-spacing:3px;opacity:0;transition:opacity .4s}
.skip-hint.show{opacity:1}

@media(max-width:760px){.cards-wrap{grid-template-columns:repeat(5,1fr);gap:8px}
  .gcard .nm{font-size:11px} .gcard .tg{font-size:9px}}

function activePhase(){return phases.filter(p=>S.today>=p.start&&S.today<p.end)}

function cur(){
  const a=activeBanners();

/* ============== 概率 ============== */
function rate(p){
  if(p>=80)return 1;
  if(p<=65)return .008;
  if(p<=70)return Math.min(1,.008+(p-65)*.04);
  if(p<=75)return Math.min(1,.008+5*.04+(p-70)*.08);
  return Math.min(1,.008+5*.04+5*.08+(p-75)*.10);
}
function poolTide(pool){
  if(pool==='eventChar'||pool==='noviceChoice')return ['radiant','浮金波纹','r'];
  if(pool==='eventWeapon')return ['forging','铸潮波纹','f'];
  if(pool==='collabChar')return ['dream','捕梦波纹','r'];
  if(pool==='collabWeapon')return ['mirage','铭影波纹','f'];
  return ['lustrous','唤声涡纹','l'];
}
function tideKey(pool){return poolTide(pool)[0]}
function tideName(pool){return poolTide(pool)[1]}
function tideLetter(pool){return poolTide(pool)[2]}
function poolKind(pool){return pool==='eventWeapon'||pool==='collabWeapon'||pool==='standardWeapon'?'weapon':'char'}
function poolTitle(b){
  if(!b)return '';
  if(b.pool==='eventChar')return '角色活动唤取';
  if(b.pool==='eventWeapon')return '武器活动唤取';
  if(b.pool==='collabChar')return '角色联动唤取';
  if(b.pool==='collabWeapon')return '武器联动唤取';
  if(b.pool==='standardChar')return '角色常驻唤取';
  if(b.pool==='standardWeapon')return '武器常驻唤取';
  if(b.pool==='beginner')return '新手唤取';
  return '角色新旅唤取';
}
function targetOptions(b){
  if(!b)return '';
  let opts=[];
  if(b.pool==='standardWeapon')opts=standardWeapons.map(w=>({label:w.banner,target:w.name,active:w.name===S.standardWeaponTarget}));
  if(b.pool==='noviceChoice')opts=newJourneyChars.map(c=>({label:c,target:c,active:c===S.noviceTarget}));
  if(!opts.length)return '';
  return `<div class="ba-weapon" style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px">
    ${opts.map(o=>`<button class="mbtn ${o.active?'gold':''}" onclick="selectTarget('${b.pool}','${o.target}')">${o.label}</button>`).join('')}
  </div>`;
}
function selectTarget(pool,target){
  if(pool==='standardWeapon')S.standardWeaponTarget=target;
  if(pool==='noviceChoice')S.noviceTarget=target;
  render();
}

/* ============== 抽卡（沉默版，不直接消耗） ============== */
function payOne(pool){
  const key=tideKey(pool);
  if(S[key]>0){S[key]--;return true}
  if(S.astrite>=160){S.astrite-=160;return true}
  return false;
}
function payBeginnerTen(){
  const key=tideKey('beginner');
  let need=8;
  const useTide=Math.min(need,S[key]);
  S[key]-=useTide; need-=useTide;
  const cost=need*160;
  if(S.astrite>=cost){S.astrite-=cost;return true}
  S[key]+=useTide;
  return false;
}
function pull(pool,free=false){
  const b=cur(); if(!b)return null;
  if(!free && !payOne(pool))return null;
  S.total++; S.pity[pool]++; S.p4[pool]++;
  if(pool==='beginner')S.beginnerPulls++;
  const r=Math.random(),fr=pool==='beginner'&&S.beginnerPulls>=50?1:rate(S.pity[pool]);
  if(r<fr)return five(pool,b);
  if(S.p4[pool]>=10||r<fr+.06)return four(pool,b);
  S.oscillated+=15;
  return mk(3,pick(threeWeapons),'三星武器',pool);
}
function charCoral(r,pulled){
  if(r===5)return pulled===1?15:(pulled<=7?15:40);
  if(r===4)return pulled===1?3:(pulled<=7?3:8);
  return 0;
}
function five(pool,b){
  const pity=S.pity[pool];
  S.pity[pool]=0; S.p4[pool]=0; S.five++;
  let name,type,up=false,coral=15;
  if(pool==='eventWeapon'||pool==='collabWeapon'||pool==='standardWeapon'){
    name=b.weapon;type=pool==='standardWeapon'?'定向常驻五星武器':(pool==='collabWeapon'?'目标联动五星武器':'目标五星武器');up=true;
    addWeapon(name,5);
    coral=15;
  }else if(pool==='noviceChoice'){
    up=true; name=b.char; type='新旅目标五星角色';
    const r=addRole(name,5);
    coral=charCoral(5,r.pulled);
  }else if(pool==='beginner'){
    name=pick(standard5);type='新手五星角色';up=false;S.beginnerDone=true;
    const r=addRole(name,5);
    coral=charCoral(5,r.pulled);
  }else if(pool==='standardChar'){
    name=pick(standard5);type='常驻五星角色';up=false;
    const r=addRole(name,5);
    coral=charCoral(5,r.pulled);
  }else if(pool==='collabChar'){
    up=true; name=b.char; type='概率提升联动五星角色';
    const r=addRole(name,5);
    coral=charCoral(5,r.pulled);
  }else{
    up=S.g[pool]||Math.random()<.5;
    name=up?b.char:pick(standard5);
    type=up?'概率提升五星角色':'常驻五星角色';
    S.g[pool]=!up;
    const r=addRole(name,5);
    coral=charCoral(5,r.pulled);
    if(!up)coral+=30;
  }
  if(up){type+=' · 命中提升'; S.upHits++;}
  S.afterglow+=coral;
  return mk(5,name,type,pool,pity,up);
}
function four(pool,b){
  S.four++; S.p4[pool]=0;
  const up=S.g4[pool]||Math.random()<.5;
  let name,type,coral=3;
  if(up){
    name=poolKind(pool)==='weapon'?pick(b.fours):pick(b.fours);
    type=poolKind(pool)==='weapon'?'概率提升四星武器':'概率提升四星角色';
  }else{
    name=poolKind(pool)==='weapon'||Math.random()<.5?pick(fourWeapons):pick(fourAll);
    type=fourWeapons.includes(name)?'四星武器':'四星角色';
  }
  if(fourWeapons.includes(name)){
    addWeapon(name,4); coral=3;
  }else{
    const r=addRole(name,4); coral=charCoral(4,r.pulled);
  }
  S.g4[pool]=!up;
  S.afterglow+=coral;
  return mk(4,name,type,pool,S.pity[pool],up);
}
function mk(r,n,t,pool,pity,up){return{r,n,t,pool,pity:pity??S.pity[pool],up:!!up,no:S.total,date:fmt(S.today)}}
function addRole(n,r){
  const o=S.roles[n]||{n,r,owned:0,chain:0,spare:0,bought:0,pulled:0};
  o.pulled=(o.pulled||0)+1;
  if(o.owned===0)o.owned=1;
  else if(o.pulled<=7)o.spare++;
  S.roles[n]=o; return o;
}
function addWeapon(n,r){
  const o=S.weapons[n]||{n,r,pulled:0};
  o.pulled=(o.pulled||0)+1;
  S.weapons[n]=o; return o;
}

let animating=false;
function getPool(){const b=cur();return b?b.pool:'eventChar'}

function canAffordPulls(n){
  const k=getPool(),tide=S[tideKey(k)];
  if(k==='beginner'&&n===10){
    const fromTide=Math.min(8,tide);
    const cost=(8-fromTide)*160;
    const missing=Math.max(0,cost-S.astrite);
    return {ok:S.astrite>=cost,okWithLunite:S.astrite+S.lunite>=cost,tide:fromTide,astrite:cost,missing,total:n,possible:S.beginnerPulls>=50?0:10};
  }
  const fromTide=Math.min(n,tide);
  const remain=n-fromTide;
  const cost=remain*160;
  const missing=Math.max(0,cost-S.astrite);
  return {
    ok:S.astrite>=cost,
    okWithLunite:S.astrite+S.lunite>=cost,
    tide:fromTide,
    astrite:cost,
    missing,
    total:n,
    possible:tide+Math.floor((S.astrite+S.lunite)/160)
  };
}
function doPullN(n,free=false){
  if(animating)return;
  if(!cur())return msg('当前日期无可用卡池');
  if(getPool()==='beginner'&&n!==10&&!free)return msg('万象新声仅支持十连唤取');
  const pool=getPool();
  let freePull=free;
  if(pool==='beginner'&&n===10&&!free){
    if(!payBeginnerTen())return msg('资源不足，万象新声十连需要 8 个唤声涡纹或等值星声');
    freePull=true;
  }
  const arr=[];
  for(let i=0;i<n;i++){const x=pull(pool,freePull); if(!x)break; arr.push(x);}
  if(arr.length){
    S.log=arr.slice().reverse().concat(S.log).slice(0,200);
    showResult(arr);
  }
  render();
}

function tryPull(n){
  if(animating)return;
  if(!cur())return msg('当前日期无可用卡池');

当前持有 <b class="a">${tide}</b> 个 ${tideName(k)}、<b class="g">${S.astrite.toLocaleString()}</b> 星声、<b>${S.lunite}</b> 月相。<br><br>
是否将 <b class="g">${c.missing.toLocaleString()}</b> 月相转为星声，用来补足本次唤取？`,
      actions:[

function versionAt(t){
  const p=phases.find(x=>t>=x.start&&t<x.end);
  return p?p.v:null;
}
function settleDays(target){
  const days=Math.max(0,Math.floor((target-S.today)/DAY));
  const paid=Math.min(days,S.days);
  S.days-=paid;
  S.astrite+=paid*90;
}
function claimMonthly(){
  if(S.days>0){S.days--;S.astrite+=90;return true}
  return false;
}
function advanceTo(target){
  const oldVersion=versionAt(S.today);
  settleDays(target);
  S.today=target;
  if(versionAt(S.today)!==oldVersion)refreshVersion(false);
  render();
}
function advanceDay(){advanceTo(S.today+DAY)}
function dailyTick(){return claimMonthly()}
function nextPhase(){
  const n=phases.map(p=>p.start).filter(t=>t>S.today).sort((a,b)=>a-b)[0];
  if(n)advanceTo(n);
}
function nextVersion(){
  const curV=(activePhase()[0]||{}).v;
  const n=phases.find(p=>p.start>S.today&&p.v!==curV);
  if(n)advanceTo(n.start);
}
function refreshVersion(toast){
  S.oscBuy={radiant:0,forging:0,lustrous:0};
  if(toast)msg('版本周期已刷新',false);
}

/* ============== 通用弹窗 ============== */
function openModal({title,body,qty,actions}){
  const box=$('modalBox');
  let html=`<h3>${title}</h3><div class="desc">${body}</div>`;
  if(qty){
    html+=`<div class="qty-row">
      <button class="qbtn" onclick="adjustQty(-1)">−</button>
      <input class="qty-input" id="qtyInput" type="number" min="${qty.min}" max="${qty.max}" value="${qty.init}">
      <button class="qbtn" onclick="adjustQty(1)">＋</button>
    </div>
    <div class="qty-presets">
      ${qty.presets.map(v=>`<button onclick="setQty(${v})">${v}</button>`).join('')}
      <button onclick="setQty(${qty.max})">最大</button>
    </div>`;
  }
  html+=`<div class="modal-acts">${actions.map((a,i)=>`<button class="${a.cls}" data-i="${i}">${a.label}</button>`).join('')}</div>`;
  box.innerHTML=html;
  box.querySelectorAll('.modal-acts button').forEach((b,i)=>{
    b.onclick=()=>{
      const v=qty?Math.max(qty.min,Math.min(qty.max,+($('qtyInput').value)||qty.min)):null;
      $('modal').classList.remove('on');
      actions[i].fn(v);
    };
  });
  if(qty){
    const inp=$('qtyInput');
    inp.oninput=()=>{const n=+inp.value; if(n>qty.max)inp.value=qty.max; if(n<qty.min)inp.value=qty.min;};
  }
  $('modal').classList.add('on');
}
function adjustQty(d){const i=$('qtyInput');if(!i)return; i.value=Math.max(+i.min,Math.min(+i.max,(+i.value||0)+d));}
function setQty(v){const i=$('qtyInput');if(!i)return; i.value=Math.max(+i.min,Math.min(+i.max,v));}

  });

  arr.forEach(x=>{
    const c=document.createElement('div');
    c.className='gcard r'+x.r+(x.up?' up':'')+(arr.length===1?' single':'');
    c.innerHTML=`<div class="face">

  const onTap=()=>{
    if(phase===0){cards.querySelectorAll('.gcard').forEach(el=>el.classList.add('flipped'));phase=1;}
    else{
      ov.classList.remove('on'); hint.classList.remove('show');
      beam.classList.remove('show','gold','purple','blue');
      ov.removeEventListener('click',onTap);
      setTimeout(()=>{animating=false;},300);
    }
  };
  ov.addEventListener('click',onTap);
}
function spawnSparks(n,cls){
  const sp=$('sparks');
  const color=cls==='gold'?'#ffe89a':cls==='purple'?'#e6d4ff':'#cfeaff';
  for(let i=0;i<n;i++){
    const s=document.createElement('i');
    const ang=Math.random()*Math.PI*2,dist=100+Math.random()*220;
    s.style.background=color; s.style.boxShadow='0 0 10px '+color;
    s.style.setProperty('--dx',Math.cos(ang)*dist+'px');
    s.style.setProperty('--dy',Math.sin(ang)*dist+'px');
    s.style.animation=`spark ${.7+Math.random()*.6}s ease-out forwards`;
    s.style.animationDelay=(Math.random()*.3)+'s';
    sp.appendChild(s);
  }
  setTimeout(()=>sp.innerHTML='',1800);
}

/* ============== 渲染 ============== */
function render(){
  const aps=activePhase(),bs=activeBanners(),b=cur();

  // 顶部全局资源
  const gres=[
    {c:'ast',l:'星声',v:S.astrite.toLocaleString(),k:'astrite'},
    {c:'lun',l:'月相',v:S.lunite,k:'lunite'},
    {c:'r',l:'浮金',v:S.radiant,k:'radiant'},
    {c:'f',l:'铸潮',v:S.forging,k:'forging'},
    {c:'l',l:'唤声',v:S.lustrous,k:'lustrous'}
  ];
  if(S.days>0)gres.push({c:'day',l:'月卡',v:S.days+'天'});
  $('gres').innerHTML=gres.map(x=>`<span class="gtag ${x.c}"><span class="dot"></span>${x.l} <b>${x.v}</b>${x.k?`<button class="plus" onclick="openTopup('${x.k}')" title="兑换/补充">+</button>`:''}</span>`).join('');

  // 时间
  $('dateNow').textContent=fmt(S.today);
  const vs=aps.map(p=>p.v).filter((v,i,a)=>a.indexOf(v)===i).join(' · ')||'无';
  $('dateMeta').textContent=`版本 ${vs} · 开放卡池 ${bs.length}`;

  // 卡池横向 Tab
  if(bs.length){
    $('bnTabs').innerHTML=bs.map(x=>{
      const kind=poolKind(x.pool);
      const on=x.id===S.selected?(' on '+(kind==='weapon'?'w':'r')):'';
      let tag='角色';
      if(kind==='weapon')tag='武器';
      if(x.pool==='beginner'||x.pool==='noviceChoice')tag='新手';
      else if(x.pool==='standardChar'||x.pool==='standardWeapon')tag='常驻';
      else if(x.pool==='eventChar'||x.pool==='eventWeapon')tag=tag+' · 限定';
      else if(x.pool==='collabChar'||x.pool==='collabWeapon')tag=tag+' · 联动';
      return `<div class="btab${on}" data-id="${x.id}"><span class="bt-kind">${tag}</span><span class="bt-name">${x.banner}</span></div>`;
    }).join('');
    $('bnTabs').querySelectorAll('.btab').forEach(el=>el.onclick=()=>{
      S.selected=el.dataset.id;
      render();
    });

    // banner art
    const pool=b.pool,kind=poolKind(pool);
    const upText=(()=>{
      if(pool==='collabChar'||pool==='noviceChoice')return '100% 本期角色';
      if(pool==='eventChar')return '50% 本期角色';
      if(pool==='eventWeapon'||pool==='collabWeapon')return '100% 本期武器';
      if(pool==='standardWeapon')return '100% 自选武器';
      if(pool==='beginner')return '50 抽内必出五星';
      if(pool==='standardChar')return '常驻五星';
      return '';
    })();
    const headline=kind==='weapon'?b.weapon:(b.char||'常驻共鸣者');
    const subline=kind==='weapon'
      ?(b.char?`同期共鸣者 <b>${b.char}</b>`:`当前定向 <b>${b.weapon}</b>${b.weaponBanner?' · '+b.weaponBanner:''}`)
      :(b.pool==='noviceChoice'?`当前目标 <b>${b.char}</b>`:(b.weapon?`同期武器 <b>${b.weapon}</b>`:'常驻五星角色池'));
    const remainDays=Math.max(0,Math.ceil((b.end-S.today)/DAY));
    $('bnArt').className='banner-art '+(kind==='weapon'?'theme-l':'theme-r');
    $('bnArt').innerHTML=`
      <div class="ba-main">
        <div class="ba-sub">${poolTitle(b)} · ${b.version}</div>
        <div class="ba-name${headline.length>5?' small':''}">${headline}</div>
        <div class="ba-banner">「${b.banner}」</div>
        <div class="ba-weapon">${subline}</div>
        <div class="ba-fours"><b>四 星</b> ${b.fours.join(' · ')}</div>
        ${targetOptions(b)}
      </div>
      <div class="ba-meta">
        <div class="ba-up">${upText}</div>
        <div class="ba-period">${b.end===Infinity?'长期开放':fmt(b.start)+' — '+fmt(b.end)}</div>
        <div class="ba-remaining">${b.end===Infinity?'':'剩余 <b style="color:var(--accent)">'+remainDays+'</b> 天'}</div>
      </div>`;
  }else{
    $('bnTabs').innerHTML='';
    $('bnArt').innerHTML='<div style="text-align:center;color:var(--muted);padding:40px 0">当前日期没有开放卡池</div>';
  }

  // 抽卡区
  if(b){
    const pool=b.pool,tk=tideKey(pool),tn=tideName(pool),letter=tideLetter(pool);
    const tideHave=S[tk]||0;
    const astHave=S.astrite;
    const lunHave=S.lunite;
    const total10=10;
    const priced10=pool==='beginner'?8:10;
    const tideUsed10=Math.min(priced10,tideHave);
    const astUsed10=(priced10-tideUsed10)*160;
    const lunNeed10=Math.max(0,astUsed10-astHave);
    const can1=tideHave>=1||astHave+lunHave>=160;
    const can10=tideHave+Math.floor((astHave+lunHave)/160)>=priced10 && !(pool==='beginner'&&S.beginnerDone);
    const maxPulls=tideHave+Math.floor(astHave/160);
    const maxPullsWithLunite=tideHave+Math.floor((astHave+lunHave)/160);

    $('costPanel').innerHTML=`
      <div class="cost tide ${letter}">
        <div class="lbl">${tn}</div>
        <div class="val"><b>${tideHave}</b><span class="u">个</span></div>
        <div class="sub">十连消耗 ${tideUsed10} 个${pool==='beginner'?'（八折）':''}</div>
      </div>
      <div class="cost ast">
        <div class="lbl">星 声</div>
        <div class="val"><b>${astHave.toLocaleString()}</b></div>
        <div class="sub">十连补 ${astUsed10.toLocaleString()} 星声</div>
      </div>
      <div class="cost can">
        <div class="lbl">合计可抽</div>
        <div class="val"><b>${maxPulls}</b><span class="u">次</span></div>
        <div class="sub">含月相 ${maxPullsWithLunite} 次</div>
      </div>`;

    $('pull1').disabled=!can1||pool==='beginner';
    $('pull10').disabled=!can10;
    $('toFive').disabled=!can1||pool==='beginner';
    $('lbl1').textContent=`× 1 · ${tideHave>0?'消耗 1 '+tn:'消耗 160 星声'}`;
    $('lbl10').textContent=`× 10 · 消耗 ${tideUsed10>0?tideUsed10+' '+tn:''}${astUsed10>0?(tideUsed10>0?' + ':'')+Math.min(astUsed10,astHave).toLocaleString()+' 星声':''}${lunNeed10>0?' + '+lunNeed10.toLocaleString()+' 月相':''}`;

    // 保底
    const pkey=pool;
    const pity=S.pity[pkey];
    const hard=pool==='beginner'?50:80;
    let gtxt='',gcls='';
    if(pool==='eventChar'){
      if(S.g[pkey]){gtxt='下个五星必为本期角色';gcls='guar';}
      else gtxt='下个五星 50% 为本期角色';
    }else if(pool==='collabChar'||pool==='noviceChoice'){
      gtxt='下个五星必为本期角色';gcls='guar';
    }else if(pool==='eventWeapon'||pool==='collabWeapon'){
      gtxt='下个五星必为本期武器';gcls='guar';
    }else if(pool==='standardWeapon'){
      gtxt='下个五星必为自选武器';gcls='guar';
    }else if(pool==='beginner'){
      gtxt=`已抽 ${S.beginnerPulls} / 50`;
    }else{
      gtxt='常驻五星';
    }
    $('pityRow').innerHTML=`
      <div>
        <div class="pl">五 星 进 度</div>
        <div class="pv"><b>${pity}</b> / ${hard}</div>
      </div>
      <div class="pity-bar"><i style="width:${Math.min(100,pity/hard*100)}%"></i></div>
      <span class="pity-tag ${gcls}">${gtxt}</span>`;
  }else{
    $('costPanel').innerHTML='';
    $('pityRow').innerHTML='<div style="color:var(--muted);font-size:12px;letter-spacing:1px;text-align:center;width:100%">推进日期到开放期才能唤取</div>';
    ['pull1','pull10','toFive'].forEach(id=>$(id).disabled=true);
  }

  // 统计
  $('sTotal').textContent=S.total;
  $('sFive').textContent=S.five;
  $('sFour').textContent=S.four;
  $('sAvg').textContent=S.five?(S.total/S.five).toFixed(1):'-';
  $('sUp').textContent=S.upHits;
  $('sWave').textContent=Object.values(S.waveBuy).reduce((a,b)=>a+b,0);
  const curPool=b?b.pool:'eventChar';
  const charPityPool=poolKind(curPool)==='char'?curPool:'eventChar';
  const weapPityPool=poolKind(curPool)==='weapon'?curPool:'eventWeapon';
  $('sCharPity').textContent=S.pity[charPityPool]||0;
  $('sWeapPity').textContent=S.pity[weapPityPool]||0;

  // 海市
  $('cAg').textContent=S.afterglow;
  $('cOs').textContent=S.oscillated;
  $('cAgHint').textContent=`可换 ${Math.floor(S.afterglow/8)} 抽`;
  $('cOsHint').textContent=`可换 ${Math.floor(S.oscillated/70)} 抽`;
  const tides=[['radiant','浮金波纹'],['forging','铸潮波纹'],['lustrous','唤声波纹']];
  $('exList').innerHTML=tides.map(([k,n])=>{
    const agMax=Math.floor(S.afterglow/8);
    const osLeft=7-(S.oscBuy[k]||0);
    const osMax=Math.min(Math.floor(S.oscillated/70),osLeft);
    return `<div class="exch">
      <div class="n"><span>${n}</span><span class="own">持有 <b>${S[k]}</b> 个</span></div>
      <div class="btns">
        <button class="mbtn" onclick="openExchangeModal('${k}','${n}','afterglow')" ${agMax<=0?'disabled':''}>余 波 · 最多 ${agMax}</button>
        <button class="mbtn gold" onclick="openExchangeModal('${k}','${n}','oscillated')" ${osMax<=0?'disabled':''}>残 振 · 剩 ${osLeft}/7</button>
      </div>
    </div>`;
  }).join('');

  if(b&&b.char&&(b.pool==='eventChar'||b.pool==='collabChar'||b.pool==='noviceChoice')){
    const std=standard5.some(x=>x.startsWith(b.char)),cost=std?270:360,used=S.waveBuy[b.char]||0;
    const can=Math.min(2-used,Math.floor(S.afterglow/cost));
    $('waveList').innerHTML=`<div class="exch">
      <div class="n"><span>${b.char} 备用波段</span><span class="own">已购 <b>${used}</b> / 2</span></div>
      <div class="btns">
        <button class="mbtn gold" onclick="openWaveModal()" ${can<=0?'disabled':''}>余波 ${cost} / 个 · 可换 ${can}</button>
      </div>
    </div>`;
  }else{
    $('waveList').innerHTML='<div style="color:var(--muted);font-size:12px;text-align:center;padding:12px;letter-spacing:1px">无可用卡池</div>';
  }

  // 商店
  $('kSpent').textContent='¥'+S.spent;
  $('kLunite').textContent=S.lunite;
  $('kDays').textContent=S.days;
  $('topupList').innerHTML=shopCatalog.topup.map(it=>{
    const first=S.shopFirstTime[it.id];
    const badge=it.firstDouble?(first?'<span style="color:var(--gold);font-size:10px">首充翻倍</span>':'<span style="color:var(--dim);font-size:10px">已翻倍</span>'):'';
    const desc=it.firstDouble?(first?`首次购买得 ${it.lunite*2} 月相`:`得 ${it.lunite} 月相`):`得 ${it.lunite} 月相`;
    return `<div class="shopit"><div class="n">${it.name} ${badge}</div><div class="d">${desc}</div>
      <div class="p">¥${it.price}</div><button class="mbtn gold" onclick="buyShop('${it.id}')">购 买</button></div>`;
  }).join('');
  $('bundleList').innerHTML=[...shopCatalog.monthly,...shopCatalog.pass,...shopCatalog.bundle].map(it=>{
    return `<div class="shopit"><div class="n">${it.name}</div><div class="d">${it.desc}</div>
      <div class="p">¥${it.price}</div><button class="mbtn gold" onclick="buyShop('${it.id}')">购 买</button></div>`;
  }).join('');

  // 记录
  $('logList').innerHTML=S.log.length?S.log.map(x=>`
    <div class="logrow r${x.r}"><b style="color:var(${x.r===5?'--gold':x.r===4?'--purple':'--blue'})">${x.r}★</b>
      <span>${x.n}${x.up?' <span style="color:var(--gold);font-size:10px;letter-spacing:1px">提升</span>':''}</span>
      <span class="dt">${x.date}<br>#${x.no}</span></div>`).join(''):'<div style="text-align:center;color:var(--muted);padding:20px;font-size:12px;letter-spacing:1px">暂无记录</div>';

  renderRoles();
}

let expandedRoles={};
function renderRoles(){
  const arr=Object.values(S.roles).sort((a,b)=>b.r-a.r||a.n.localeCompare(b.n,'zh'));
  $('roles').innerHTML=arr.length?arr.map(o=>{
    const stars='★'.repeat(o.r);
    const chainCls=o.chain>=6?'full':(o.chain>0?'has':'');
    return `<div class="role r${o.r}" onclick="openRoleModal('${o.n.replace(/'/g,"\\'")}')">
      <div class="chain-badge ${chainCls}">+${o.chain}/6</div>
      ${o.spare>0?`<div class="spare-dot">备用 ${o.spare}</div>`:''}
      <div class="stars">${stars}</div>
      <div class="rname">${o.n}</div>
    </div>`;
  }).join(''):'<div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:30px;font-size:12px;letter-spacing:1px">还没有角色 / 武器</div>';
}
function openRoleModal(n){
  const o=S.roles[n]; if(!o)return;
  const base=o.n.split(' / ')[0];
  const hasSeq=!!seqText[base];
  const stars='★'.repeat(o.r);
  const body=`
    <div style="text-align:center;margin-bottom:10px">
      <div style="font-size:18px;font-weight:700;color:${o.r===5?'var(--gold)':'#dbc6ff'};letter-spacing:1px">${o.n}</div>
      <div style="font-size:11px;color:${o.r===5?'var(--gold)':'var(--purple)'};letter-spacing:3px;margin-top:4px">${stars}</div>
    </div>
    <div style="font-size:11px;color:var(--muted);letter-spacing:.5px;text-align:center;margin-bottom:6px">
      共鸣链 <b style="color:var(--gold)">${o.chain}/6</b> · 备用波段 <b style="color:var(--accent)">${o.spare}</b>${o.bought?' · 海市波段 '+o.bought+'/2':''}
    </div>
    <div class="chain">${[1,2,3,4,5,6].map(i=>`<i class="${i<=o.chain?'on':''}">${i}链</i>`).join('')}</div>
    ${hasSeq?`<div class="seq-detail">
      ${seqText[base].map((s,i)=>`<div class="seq-line"><b class="seq-name ${i<o.chain?'owned':''}">${i+1}链 · ${s[0]}</b><div class="seq-desc">${s[1]}</div></div>`).join('')}
    </div>`:'<div style="font-size:11px;color:var(--dim);text-align:center;padding:10px">暂无共鸣链文案</div>'}`;
  const canUp=o.spare>0&&o.chain<6;
  openModal({
    title:'共鸣链详情',
    body,
    actions:[
      {cls:'mbtn',label:'关闭',fn:()=>{}},
      {cls:'mbtn '+(canUp?'gold':''),label:o.chain>=6?'已满 6链':(canUp?`激活 ${o.chain+1}链`:'无备用波段'),fn:()=>{if(canUp)upgrade(o.n);}}
    ]
  });
}
function toggleRole(n){openRoleModal(n);}

/* ============== 绑定 ============== */
$('nextDay').onclick=advanceDay;
$('todayBtn').onclick=()=>{S.today=date('2026-06-23');refreshVersion();render();};
$('nextPhase').onclick=nextPhase;
$('nextVersion').onclick=nextVersion;
$('reset').onclick=()=>{
  openModal({title:'重置全部进度',
    body:'此操作将清空所有抽卡记录、资源、共鸣链、充值记录。<br><b class="r">不可恢复</b>。',
    actions:[{label:'取消',cls:'',fn:()=>{}},{label:'确认重置',cls:'warn',fn:()=>{S=state0();render();msg('已重置',false);}}]});
};
$('pull1').onclick=()=>tryPull(1);
$('pull10').onclick=()=>tryPull(10);
$('free10').onclick=()=>doPullN(10,true);
$('toFive').onclick=toFive;
$('convertLunite').onclick=()=>{
  if(S.lunite<=0)return msg('无月相可转');
  openModal({title:'月相转星声',body:`将 <b class="g">${S.lunite}</b> 月相全部转为星声（1:1）`,
    actions:[{label:'取消',cls:'',fn:()=>{}},{label:'确认',cls:'primary',fn:()=>{S.astrite+=S.lunite;S.lunite=0;msg('转换成功',false);render();}}]});
};
$('dailyLunite').onclick=()=>{if(S.days<=0)return msg('无月卡天数');dailyTick();msg('+90 星声',false);render();};
$('clearLog').onclick=()=>{S.log=[];msg('已清空',false);render();};
document.querySelectorAll('.s-tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.s-tab').forEach(x=>x.classList.toggle('on',x===t));
  ['stat','ex','shop','log'].forEach(s=>{
    $('pane'+s[0].toUpperCase()+s.slice(1)).style.display=s===t.dataset.s?'':'none';
  });
});
$('modal').onclick=e=>{if(e.target===$('modal'))$('modal').classList.remove('on');};

render();
</script>
