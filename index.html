<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>鸣潮 · 唤取</title>
<link rel="stylesheet" href="./styles/main.css">
</head>
<body>

<div class="topbar">
  <div class="topbar-in">
    <div class="brand">鸣 潮 · 唤 取</div>
    <div class="gres" id="gres"></div>
  </div>
</div>

<div class="app">
  <div class="timeline">
    <div class="ti">
      <div class="now" id="dateNow">2024-05-23</div>
      <div class="meta" id="dateMeta"></div>
    </div>
    <div class="t-actions">
      <button class="tbtn" id="nextDay">＋1 日</button>
      <button class="tbtn" id="nextPhase">下一期</button>
      <button class="tbtn" id="nextVersion">下版本</button>
      <button class="tbtn" id="pickVersion">选版本</button>
      <button class="tbtn" id="todayBtn">今 天</button>
      <button class="tbtn danger" id="reset">重 置</button>
    </div>
  </div>

  <!-- 顶层视图切换 -->
  <div class="view-tabs">
    <button class="vtab on" data-v="gacha"><span class="vt-zh">唤 取</span><span class="vt-sub">卡池 · 角色 · 海市</span></button>
    <button class="vtab" data-v="adventure"><span class="vt-zh">冒 险</span><span class="vt-sub">编队 · 日常 · 副本 · 深塔</span></button>
    <button class="vtab" data-v="bag"><span class="vt-zh">背 包</span><span class="vt-sub">材料 · 武器 · 药剂</span></button>
    <button class="vtab" data-v="storage"><span class="vt-zh">商 店</span><span class="vt-sub">充值 · 月卡 · 电台</span></button>
  </div>

  <!-- ====== 视图 1：唤取 ====== -->
  <div class="view" id="viewGacha">
    <!-- 上：卡池 + 抽卡 -->
    <div class="section-top">
      <div class="banner-wrap">
        <div class="banner-tabs" id="bnTabs"></div>
        <div class="banner-art" id="bnArt"></div>
      </div>

      <div class="pull-card">
        <div class="cost-panel" id="costPanel"></div>
        <div class="pity-row" id="pityRow"></div>
        <div class="pull-btns">
          <button class="pbtn" id="pull1"><span class="big">唤取</span><span class="small" id="lbl1">× 1</span></button>
          <button class="pbtn" id="pull10"><span class="big">十连唤取</span><span class="small" id="lbl10">× 10</span></button>
        </div>
        <div class="pull-extras">
          <button class="xbtn" id="toFive">抽到下个五星</button>
          <button class="xbtn" id="free10">试手十连</button>
        </div>
      </div>
    </div>

    <!-- 下：左角色 + 右侧栏 tab（统计 / 海市 / 记录） -->
    <div class="section-bot">
      <div class="col">
        <div class="col-wrap">
          <h2 class="col-head">角 色 与 共 鸣 链</h2>
          <div class="roles" id="roles"></div>
        </div>
      </div>

      <div class="col">
        <div class="col-wrap">
          <div class="side-tabs">
            <div class="s-tab on" data-s="stat">统 计</div>
            <div class="s-tab" data-s="ex">海 市</div>
            <div class="s-tab" data-s="log">记 录</div>
          </div>

          <div class="pane" id="paneStat">
            <div class="stats">
              <div class="stat"><b id="sTotal">0</b><span>总抽数</span></div>
              <div class="stat"><b id="sFive">0</b><span>五星</span></div>
              <div class="stat"><b id="sFour">0</b><span>四星</span></div>
              <div class="stat"><b id="sAvg">-</b><span>出金均值</span></div>
              <div class="stat"><b id="sUp">0</b><span>提升命中</span></div>
              <div class="stat"><b id="sWave">0</b><span>波段持有</span></div>
              <div class="stat"><b id="sCharPity">0</b><span>角色垫</span></div>
              <div class="stat"><b id="sWeapPity">0</b><span>武器垫</span></div>
              <div class="stat"><b id="sRoles">0</b><span>已拥角色</span></div>
              <div class="stat"><b id="sWeapons">0</b><span>已拥武器</span></div>
            </div>
            <div id="sCollectionDetail" style="margin-top:10px;font-size:11px;color:var(--muted);text-align:center;letter-spacing:.5px"></div>
          </div>

          <div class="pane" id="paneEx" style="display:none">
            <h2 class="col-head" style="margin-top:0">海 市 珊 瑚</h2>
            <div class="coral-bar">
              <div class="coral"><div class="l">余 波 珊 瑚</div><div class="v" id="cAg">0</div>
                <div class="h" id="cAgHint">可换 0 抽</div></div>
              <div class="coral osc"><div class="l">残 振 珊 瑚</div><div class="v" id="cOs">0</div>
                <div class="h" id="cOsHint">可换 0 抽</div></div>
            </div>
            <h2 class="col-head" style="margin-top:14px">波 纹 兑 换</h2>
            <div class="exch-list" id="exList"></div>
            <h2 class="col-head" style="margin-top:14px">角 色 波 段</h2>
            <div class="exch-list" id="waveList"></div>
          </div>

          <div class="pane" id="paneLog" style="display:none">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
              <span style="font-size:11px;color:var(--muted);letter-spacing:1px">最近 200 条</span>
              <button class="mbtn" id="clearLog">清空</button>
            </div>
            <div class="log" id="logList"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ====== 视图 2：冒险 ====== -->
  <div class="view" id="viewAdventure" style="display:none">
    <div class="col-wrap">
      <div class="side-tabs">
        <div class="a-tab on" data-a="team">编 队</div>
        <div class="a-tab" data-a="daily">日 常</div>
        <div class="a-tab" data-a="dungeon">副 本</div>
        <div class="a-tab" data-a="abyss">深 塔</div>
        <div class="a-tab" data-a="wastes">海 墟</div>
      </div>
      <div class="pane" id="paneTeam"></div>
      <div class="pane" id="paneDaily" style="display:none"></div>
      <div class="pane" id="paneDungeon" style="display:none"></div>
      <div class="pane" id="paneAbyss" style="display:none"></div>
      <div class="pane" id="paneWastes" style="display:none"></div>
    </div>
  </div>

  <!-- ====== 视图 3：背包（独立顶层 tab）====== -->
  <div class="view" id="viewBag" style="display:none">
    <div class="col-wrap">
      <div id="paneBag"></div>
    </div>
  </div>

  <!-- ====== 视图 4：商店 ====== -->
  <div class="view" id="viewStorage" style="display:none">
    <div class="col-wrap">
      <div class="side-tabs">
        <div class="b-tab on" data-b="podcast">电 台</div>
        <div class="b-tab" data-b="shop">商 店</div>
      </div>
      <div class="pane" id="panePodcast"></div>
      <div class="pane" id="paneShop" style="display:none">
        <h2 class="col-head" style="margin-top:0">钱 包</h2>
        <div class="shop-bar">
          <div class="sb spent"><div class="l">累计充值</div><div class="v" id="kSpent">¥0</div></div>
          <div class="sb lun"><div class="l">月相库存</div><div class="v" id="kLunite">0</div></div>
          <div class="sb days"><div class="l">月卡剩余</div><div class="v" id="kDays">0</div></div>
        </div>

        <!-- 商店分类 tab -->
        <div class="shop-cat-tabs">
          <button class="sct on" data-sc="featured">特惠专区</button>
          <button class="sct" data-sc="regular">常驻礼包</button>
          <button class="sct" data-sc="topup">凝刻月相</button>
        </div>

        <!-- 特惠专区：月卡 + 战令 + 限购礼包 -->
        <div class="shop-cat" id="scFeatured">
          <div class="shop-banners" id="bannerFeatured"></div>
        </div>

        <!-- 常驻礼包：长期不下架的礼包（暂时也是 bundle 里的，按 period 区分） -->
        <div class="shop-cat" id="scRegular" style="display:none">
          <div class="shop-banners" id="bannerRegular"></div>
        </div>

        <!-- 凝刻月相（直充） -->
        <div class="shop-cat" id="scTopup" style="display:none">
          <div class="shop-banners topup-grid" id="bannerTopup"></div>
        </div>

        <div style="display:flex;gap:6px;margin-top:14px">
          <button class="mbtn gold" style="flex:1" id="convertLunite">月 相 → 星 声</button>
          <button class="mbtn" style="flex:1" id="dailyLunite">领月卡星声</button>
        </div>
        <div style="display:flex;gap:6px;margin-top:6px">
          <button class="mbtn" style="flex:1" id="exportSaveBtn">导出存档</button>
          <button class="mbtn" style="flex:1" id="importSaveBtn">导入存档</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 全局 toast -->
  <div class="toast" id="toast"></div>
</div>

<!-- 抽卡动画 -->
<div class="overlay" id="ov">
  <div class="ov-title" id="ovTitle"></div>
  <div class="beam" id="beam"></div>
  <div class="sparks" id="sparks"></div>
  <div class="cards-wrap" id="cards"></div>
</div>
<div class="skip-hint" id="skipHint">点击屏幕翻开所有 · 再次点击关闭</div>

<!-- 通用弹窗 -->
<div class="modal" id="modal">
  <div class="modal-box" id="modalBox"></div>
</div>

<!-- 战斗界面（全屏覆盖） -->
<div id="battleOverlay" style="display:none;position:fixed;inset:0;z-index:85;background:rgba(0,0,0,.92);backdrop-filter:blur(8px);align-items:flex-start;justify-content:center;overflow-y:auto"></div>

<script type="module" src="./src/main.js"></script>
</body>
</html>
